workflows:
  ios_only:
    name: Build iOS Only
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Flutter dependencies
        script: |
          cd mobile
          flutter pub get
          cd ..
      - name: Install iOS Pods
        script: |
          cd mobile/ios
          pod install
          cd ../..
      - name: Build iOS
        script: |
          cd mobile
          flutter build ios --release --no-codesign
          cd ..
    artifacts:
      - mobile/build/ios/iphoneos/*.ipa
